# Example StorageClass for NVMe-oF volumes provisioned via Ceph-CSI (--type=nvmeof).
#
# IMPORTANT:
# - Do NOT use the gateway pod name/IP in this StorageClass. Pod names/IPs change on restarts.
# - Rook creates one Service per gateway instance. Use that stable Service for addressing.
# - The listener "hostname" must match the gateway instance name:
#     rook-ceph-nvmeof-<CephNVMeOFGateway name>-<instance index>
#
# For in-cluster consumption, the per-instance Service ClusterIP/DNS works.
# For external consumption, expose that Service (e.g., LoadBalancer/NodePort) and use a reachable address.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ceph-nvmeof
parameters:
  # Namespace where the CephCluster runs (typically 'rook-ceph' for the Helm chart).
  clusterID: rook-ceph

  # Pool that backs the NVMe-oF namespaces (must exist).
  pool: nvmeofpool

  # NVMe subsystem NQN (example; pick your own naming).
  subsystemNQN: nqn.2016-06.io.spdk:cnode1.rook-ceph

  # Management API (gateway) endpoint.
  # Prefer the per-instance Service DNS name (stable) over hardcoding a ClusterIP.
  nvmeofGatewayAddress: rook-ceph-nvmeof-my-nvmeof-0.rook-ceph.svc # replace <gateway>/<namespace> as needed
  nvmeofGatewayPort: "5500"

  # Data plane listeners (NVMe/TCP I/O).
  # List ALL gateway instances for HA/multipath.
  listeners: |
    [
      {
        # Use the per-instance Service DNS name (stable) or Service ClusterIP for I/O.
        # Example (in-cluster): rook-ceph-nvmeof-my-nvmeof-0.rook-ceph.svc
        "address": "rook-ceph-nvmeof-my-nvmeof-0.rook-ceph.svc",
        "port": 4420,
        "hostname": "rook-ceph-nvmeof-my-nvmeof-0"
      }
    ]

  # Reuse the existing RBD secrets generated by the Rook operator.
  csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
  csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph
  csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
  csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph

  imageFormat: "2"
  imageFeatures: layering,deep-flatten,exclusive-lock,object-map,fast-diff
provisioner: nvmeof.csi.ceph.com
reclaimPolicy: Delete
volumeBindingMode: Immediate
allowVolumeExpansion: false
